<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="rd_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="rd_gl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
    <clipPath id="rd_cp"><rect x="85" y="50" width="540" height="290"/></clipPath>
  </defs>
  <rect width="680" height="420" rx="14" fill="url(#rd_bg)"/>
  <text x="355" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">OSNR Estimation RMSE vs. Transmission Distance</text>
  <text x="355" y="44" text-anchor="middle" font-size="10" fill="#64748b">28 GBd — comparison across models (paper Fig. 14)</text>

  <rect x="85" y="50" width="540" height="290" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="85" y1="108" x2="625" y2="108"/><line x1="85" y1="166" x2="625" y2="166"/>
    <line x1="85" y1="224" x2="625" y2="224"/><line x1="85" y1="282" x2="625" y2="282"/>
  </g>

  <!-- Y-axis -->
  <text x="77" y="54" text-anchor="end" font-size="9" fill="#94a3b8">1.6</text>
  <text x="77" y="108" text-anchor="end" font-size="9" fill="#94a3b8">1.3</text>
  <text x="77" y="166" text-anchor="end" font-size="9" fill="#94a3b8">1.0</text>
  <text x="77" y="224" text-anchor="end" font-size="9" fill="#94a3b8">0.7</text>
  <text x="77" y="282" text-anchor="end" font-size="9" fill="#94a3b8">0.4</text>
  <text x="77" y="344" text-anchor="end" font-size="9" fill="#94a3b8">0.1</text>
  <text x="24" y="195" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,24,195)">RMSE (dB)</text>

  <!-- X-axis -->
  <text x="130" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">500</text>
  <text x="238" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">1000</text>
  <text x="346" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">1500</text>
  <text x="454" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">2000</text>
  <text x="562" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">2500</text>
  <text x="625" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">3000</text>
  <text x="355" y="380" text-anchor="middle" font-size="11" fill="#475569">Transmission Distance (km)</text>

  <!-- MT-OPMNet (blue, solid) -->
  <polyline points="130,222 238,216 346,200 454,208 562,214 625,220" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" clip-path="url(#rd_cp)"/>
  <g fill="#fff" stroke="#2563eb" stroke-width="2.5" clip-path="url(#rd_cp)">
    <circle cx="130" cy="222" r="4.5"/><circle cx="238" cy="216" r="4.5"/><circle cx="346" cy="200" r="4.5"/>
    <circle cx="454" cy="208" r="4.5"/><circle cx="562" cy="214" r="4.5"/><circle cx="625" cy="220" r="4.5"/>
  </g>

  <!-- No-CAAM (purple, dashed) -->
  <polyline points="130,178 238,170 346,152 454,162 562,170 625,176" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8,4" stroke-linecap="round" clip-path="url(#rd_cp)"/>
  <g fill="#fff" stroke="#7c3aed" stroke-width="2" clip-path="url(#rd_cp)">
    <circle cx="130" cy="178" r="4"/><circle cx="238" cy="170" r="4"/><circle cx="346" cy="152" r="4"/>
    <circle cx="454" cy="162" r="4"/><circle cx="562" cy="170" r="4"/><circle cx="625" cy="176" r="4"/>
  </g>

  <!-- ST-OSNR (red, dotted) -->
  <polyline points="130,160 238,148 346,130 454,142 562,152 625,158" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" stroke-linecap="round" clip-path="url(#rd_cp)"/>
  <g fill="#fff" stroke="#dc2626" stroke-width="2" clip-path="url(#rd_cp)">
    <circle cx="130" cy="160" r="3.5"/><circle cx="238" cy="148" r="3.5"/><circle cx="346" cy="130" r="3.5"/>
    <circle cx="454" cy="142" r="3.5"/><circle cx="562" cy="152" r="3.5"/><circle cx="625" cy="158" r="3.5"/>
  </g>

  <!-- MT-ANN ref (gray) -->
  <polyline points="130,118 238,104 346,82 454,96 562,110 625,118" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" stroke-linecap="round" clip-path="url(#rd_cp)"/>
  <g fill="#fff" stroke="#94a3b8" stroke-width="1.5" clip-path="url(#rd_cp)">
    <circle cx="130" cy="118" r="3"/><circle cx="238" cy="104" r="3"/><circle cx="346" cy="82" r="3"/>
    <circle cx="454" cy="96" r="3"/><circle cx="562" cy="110" r="3"/><circle cx="625" cy="118" r="3"/>
  </g>

  <!-- Legend -->
  <rect x="420" y="56" width="195" height="82" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.95"/>
  <line x1="432" y1="72" x2="455" y2="72" stroke="#2563eb" stroke-width="2.5"/><circle cx="443" cy="72" r="3.5" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="462" y="76" font-size="9" fill="#1e293b" font-weight="600">MT-OPMNet</text>
  <line x1="432" y1="90" x2="455" y2="90" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3"/><circle cx="443" cy="90" r="3" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/><text x="462" y="94" font-size="9" fill="#475569">MT-OPMNet (no CAAM)</text>
  <line x1="432" y1="108" x2="455" y2="108" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/><circle cx="443" cy="108" r="3" fill="#fff" stroke="#dc2626" stroke-width="1.5"/><text x="462" y="112" font-size="9" fill="#475569">ST-OSNR (CNN)</text>
  <line x1="432" y1="126" x2="455" y2="126" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/><circle cx="443" cy="126" r="2.5" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/><text x="462" y="130" font-size="9" fill="#94a3b8">MT-ANN [16]</text>

  <text x="355" y="408" text-anchor="middle" font-size="9" fill="#64748b">MT-OPMNet maintains stable RMSE (0.78–0.94 dB) across all distances, outperforming baselines consistently</text>
</svg>
