<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="dd_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="700" height="340" rx="14" fill="url(#dd_bg)"/>
  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Dataset Sample Distribution: Format × OSNR Range</text>
  <text x="350" y="40" text-anchor="middle" font-size="10" fill="#64748b">16,500 total samples — uniform coverage, no class or range bias (paper Fig. 6)</text>

  <!-- Heatmap: 5 rows × 5 cols, cell 90×42 starting at (130,58) -->
  <!-- Column headers -->
  <text x="175" y="54" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">10–14 dB</text>
  <text x="265" y="54" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">14–18 dB</text>
  <text x="355" y="54" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">18–22 dB</text>
  <text x="445" y="54" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">22–26 dB</text>
  <text x="535" y="54" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">26–30 dB</text>

  <!-- Row headers -->
  <text x="122" y="84" text-anchor="end" font-size="10" font-weight="600" fill="#2563eb">QPSK</text>
  <text x="122" y="126" text-anchor="end" font-size="10" font-weight="600" fill="#7c3aed">8-QAM</text>
  <text x="122" y="168" text-anchor="end" font-size="10" font-weight="600" fill="#0891b2">16-QAM</text>
  <text x="122" y="210" text-anchor="end" font-size="10" font-weight="600" fill="#059669">32-QAM</text>
  <text x="122" y="252" text-anchor="end" font-size="10" font-weight="600" fill="#dc2626">64-QAM</text>

