  <!-- Grid -->
  <rect x="130" y="62" width="450" height="210" fill="none" stroke="#fff" stroke-width="2.5" rx="4"/>
  <g stroke="#fff" stroke-width="2">
    <line x1="220" y1="62" x2="220" y2="272"/><line x1="310" y1="62" x2="310" y2="272"/>
    <line x1="400" y1="62" x2="400" y2="272"/><line x1="490" y1="62" x2="490" y2="272"/>
    <line x1="130" y1="104" x2="580" y2="104"/><line x1="130" y1="146" x2="580" y2="146"/>
    <line x1="130" y1="188" x2="580" y2="188"/><line x1="130" y1="230" x2="580" y2="230"/>
  </g>

  <!-- Summary box -->
  <rect x="598" y="62" width="90" height="210" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="643" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a">Per Row</text>
  <text x="643" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">3,300</text>
  <text x="643" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">3,300</text>
  <text x="643" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">3,300</text>
  <text x="643" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">3,300</text>
  <text x="643" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">3,300</text>

  <!-- Axis labels -->
  <text x="355" y="295" text-anchor="middle" font-size="11" fill="#475569">OSNR Range (dB)</text>
  <text x="30" y="170" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,30,170)">Modulation Format</text>

  <text x="350" y="325" text-anchor="middle" font-size="9" fill="#64748b">5 formats × 11 OSNR × 2 symbol rates × 6 distances × 5 powers × 5 realisations = 16,500 samples</text>
