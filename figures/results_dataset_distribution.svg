    <rect x="220" y="104" width="90" height="42" fill="#7c3aed" opacity="0.65" rx="4"/><text x="265" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="310" y="104" width="90" height="42" fill="#7c3aed" opacity="0.65" rx="4"/><text x="355" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="400" y="104" width="90" height="42" fill="#7c3aed" opacity="0.65" rx="4"/><text x="445" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="490" y="104" width="90" height="42" fill="#7c3aed" opacity="0.65" rx="4"/><text x="535" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
