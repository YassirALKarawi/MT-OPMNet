    <rect x="220" y="230" width="90" height="42" fill="#dc2626" opacity="0.6" rx="4"/><text x="265" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="310" y="230" width="90" height="42" fill="#dc2626" opacity="0.6" rx="4"/><text x="355" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="400" y="230" width="90" height="42" fill="#dc2626" opacity="0.6" rx="4"/><text x="445" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="490" y="230" width="90" height="42" fill="#dc2626" opacity="0.6" rx="4"/><text x="535" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
