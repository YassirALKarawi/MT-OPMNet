    <rect x="130" y="62" width="90" height="42" fill="#2563eb" opacity="0.7" rx="4"/><text x="175" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="220" y="62" width="90" height="42" fill="#2563eb" opacity="0.7" rx="4"/><text x="265" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="310" y="62" width="90" height="42" fill="#2563eb" opacity="0.7" rx="4"/><text x="355" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="400" y="62" width="90" height="42" fill="#2563eb" opacity="0.7" rx="4"/><text x="445" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
