    <!-- Row 4: 32QAM -->
    <rect x="130" y="188" width="90" height="42" fill="#059669" opacity="0.65" rx="4"/><text x="175" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="220" y="188" width="90" height="42" fill="#059669" opacity="0.65" rx="4"/><text x="265" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
    <rect x="310" y="188" width="90" height="42" fill="#059669" opacity="0.65" rx="4"/><text x="355" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">660</text>
