<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 250" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="cn_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="cn_sh" x="-3%" y="-5%" width="106%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1060" height="250" rx="14" fill="url(#cn_bg)"/>
  <text x="530" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Supported Modulation Format Constellations</text>

  <!-- ===== OOK ===== -->
  <g filter="url(#cn_sh)">
    <rect x="20" y="48" width="190" height="190" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="20" y="48" width="190" height="28" rx="12" fill="#6366f1"/>
  <rect x="20" y="64" width="190" height="12" fill="#6366f1"/>
  <text x="115" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">OOK</text>
  <!-- Axes -->
  <line x1="50" y1="153" x2="180" y2="153" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="115" y1="90" x2="115" y2="218" stroke="#cbd5e1" stroke-width="1"/>
  <text x="183" y="149" font-size="7" fill="#94a3b8">I</text>
  <text x="118" y="88" font-size="7" fill="#94a3b8">Q</text>
  <!-- Points: 0 and 1 on real axis -->
  <circle cx="115" cy="153" r="7" fill="#6366f1" opacity="0.8"/>
  <circle cx="160" cy="153" r="7" fill="#6366f1" opacity="0.8"/>
  <text x="115" y="173" text-anchor="middle" font-size="8" fill="#6366f1">0</text>
  <text x="160" y="173" text-anchor="middle" font-size="8" fill="#6366f1">1</text>
  <text x="115" y="232" text-anchor="middle" font-size="9" fill="#475569">2 symbols · 1 bit</text>

  <!-- ===== DPSK ===== -->
  <g filter="url(#cn_sh)">
    <rect x="226" y="48" width="190" height="190" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="226" y="48" width="190" height="28" rx="12" fill="#2563eb"/>
  <rect x="226" y="64" width="190" height="12" fill="#2563eb"/>
  <text x="321" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">DPSK</text>
  <line x1="256" y1="153" x2="386" y2="153" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="321" y1="90" x2="321" y2="218" stroke="#cbd5e1" stroke-width="1"/>
  <text x="389" y="149" font-size="7" fill="#94a3b8">I</text>
  <text x="324" y="88" font-size="7" fill="#94a3b8">Q</text>
  <!-- Unit circle hint -->
  <circle cx="321" cy="153" r="40" fill="none" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Points at 0° and 180° -->
  <circle cx="361" cy="153" r="7" fill="#2563eb" opacity="0.8"/>
  <circle cx="281" cy="153" r="7" fill="#2563eb" opacity="0.8"/>
  <text x="361" y="173" text-anchor="middle" font-size="8" fill="#2563eb">0°</text>
  <text x="281" y="173" text-anchor="middle" font-size="8" fill="#2563eb">180°</text>
  <text x="321" y="232" text-anchor="middle" font-size="9" fill="#475569">2 symbols · 1 bit</text>

  <!-- ===== DQPSK ===== -->
  <g filter="url(#cn_sh)">
    <rect x="432" y="48" width="190" height="190" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="432" y="48" width="190" height="28" rx="12" fill="#0891b2"/>
  <rect x="432" y="64" width="190" height="12" fill="#0891b2"/>
  <text x="527" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">DQPSK</text>
  <line x1="462" y1="153" x2="592" y2="153" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="527" y1="90" x2="527" y2="218" stroke="#cbd5e1" stroke-width="1"/>
  <text x="595" y="149" font-size="7" fill="#94a3b8">I</text>
  <text x="530" y="88" font-size="7" fill="#94a3b8">Q</text>
  <circle cx="527" cy="153" r="40" fill="none" stroke="#a5f3fc" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- 4 points at 45°, 135°, 225°, 315° -->
  <circle cx="555" cy="125" r="7" fill="#0891b2" opacity="0.8"/>
  <circle cx="499" cy="125" r="7" fill="#0891b2" opacity="0.8"/>
  <circle cx="499" cy="181" r="7" fill="#0891b2" opacity="0.8"/>
  <circle cx="555" cy="181" r="7" fill="#0891b2" opacity="0.8"/>
  <text x="565" y="120" font-size="7" fill="#0891b2">45°</text>
  <text x="479" y="120" font-size="7" fill="#0891b2">135°</text>
  <text x="479" y="196" font-size="7" fill="#0891b2">225°</text>
  <text x="565" y="196" font-size="7" fill="#0891b2">315°</text>
  <text x="527" y="232" text-anchor="middle" font-size="9" fill="#475569">4 symbols · 2 bits</text>

  <!-- ===== 8QAM ===== -->
  <g filter="url(#cn_sh)">
    <rect x="638" y="48" width="190" height="190" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="638" y="48" width="190" height="28" rx="12" fill="#059669"/>
  <rect x="638" y="64" width="190" height="12" fill="#059669"/>
  <text x="733" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">8QAM (Star)</text>
  <line x1="668" y1="153" x2="798" y2="153" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="733" y1="90" x2="733" y2="218" stroke="#cbd5e1" stroke-width="1"/>
  <text x="801" y="149" font-size="7" fill="#94a3b8">I</text>
  <text x="736" y="88" font-size="7" fill="#94a3b8">Q</text>
  <!-- Inner ring (r=0.5) -->
  <circle cx="733" cy="153" r="22" fill="none" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Outer ring (r=1.0) -->
  <circle cx="733" cy="153" r="40" fill="none" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Inner 4 at 45° offsets -->
  <circle cx="749" cy="137" r="6" fill="#059669" opacity="0.7"/>
  <circle cx="717" cy="137" r="6" fill="#059669" opacity="0.7"/>
  <circle cx="717" cy="169" r="6" fill="#059669" opacity="0.7"/>
  <circle cx="749" cy="169" r="6" fill="#059669" opacity="0.7"/>
  <!-- Outer 4 at 0° offsets -->
  <circle cx="773" cy="153" r="6" fill="#059669" opacity="0.9"/>
  <circle cx="733" cy="113" r="6" fill="#059669" opacity="0.9"/>
  <circle cx="693" cy="153" r="6" fill="#059669" opacity="0.9"/>
  <circle cx="733" cy="193" r="6" fill="#059669" opacity="0.9"/>
  <text x="733" y="232" text-anchor="middle" font-size="9" fill="#475569">8 symbols · 3 bits</text>

  <!-- ===== 16QAM ===== -->
  <g filter="url(#cn_sh)">
    <rect x="844" y="48" width="190" height="190" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="844" y="48" width="190" height="28" rx="12" fill="#dc2626"/>
  <rect x="844" y="64" width="190" height="12" fill="#dc2626"/>
  <text x="939" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">16QAM</text>
  <line x1="874" y1="153" x2="1004" y2="153" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="939" y1="90" x2="939" y2="218" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1007" y="149" font-size="7" fill="#94a3b8">I</text>
  <text x="942" y="88" font-size="7" fill="#94a3b8">Q</text>
  <!-- 4x4 grid -->
  <circle cx="909" cy="120" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="929" cy="120" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="949" cy="120" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="969" cy="120" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="909" cy="140" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="929" cy="140" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="949" cy="140" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="969" cy="140" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="909" cy="166" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="929" cy="166" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="949" cy="166" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="969" cy="166" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="909" cy="186" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="929" cy="186" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="949" cy="186" r="5.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="969" cy="186" r="5.5" fill="#dc2626" opacity="0.8"/>
  <text x="939" y="232" text-anchor="middle" font-size="9" fill="#475569">16 symbols · 4 bits</text>
</svg>
