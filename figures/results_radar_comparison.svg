<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="rc_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="680" height="500" rx="14" fill="url(#rc_bg)"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Normalised Multi-Metric Model Comparison</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#64748b">Higher is better for all axes (RMSE &amp; latency inverted) — paper Fig. 17</text>

  <!-- Pentagon grid (5 axes), center at (340, 265), radius 170 -->
  <!-- Axes at 90°, 162°, 234°, 306°, 18° (starting top) -->
  <!-- Precomputed points for r=170: top(340,95), left(178.3,317.6), bleft(236.3,428.2), bright(443.7,428.2), right(501.7,317.6) -->

  <!-- Grid rings -->
  <g fill="none" stroke="#e2e8f0" stroke-width="0.8">
    <!-- r=170 (100%) -->
    <polygon points="340,95 178.3,317.6 236.3,428.2 443.7,428.2 501.7,317.6" opacity="0.6"/>
    <!-- r=136 (80%) -->
    <polygon points="340,129 207.5,309.1 253.7,397.6 426.3,397.6 472.5,309.1" opacity="0.5"/>
    <!-- r=102 (60%) -->
    <polygon points="340,163 236.7,300.5 271.0,367.0 409.0,367.0 443.3,300.5" opacity="0.4"/>
    <!-- r=68 (40%) -->
    <polygon points="340,197 265.9,291.9 288.3,336.4 391.7,336.4 414.1,291.9" opacity="0.3"/>
    <!-- r=34 (20%) -->
    <polygon points="340,231 295.1,283.4 305.7,305.8 374.3,305.8 384.9,283.4" opacity="0.2"/>
  </g>

  <!-- Axis lines -->
  <g stroke="#cbd5e1" stroke-width="0.8">
    <line x1="340" y1="265" x2="340" y2="95"/>
    <line x1="340" y1="265" x2="178.3" y2="317.6"/>
    <line x1="340" y1="265" x2="236.3" y2="428.2"/>
    <line x1="340" y1="265" x2="443.7" y2="428.2"/>
    <line x1="340" y1="265" x2="501.7" y2="317.6"/>
  </g>

  <!-- Axis labels -->
  <text x="340" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">OSNR Accuracy</text>
  <text x="340" y="92" text-anchor="middle" font-size="8" fill="#64748b">(1/RMSE)</text>
  <text x="155" y="325" text-anchor="end" font-size="11" font-weight="600" fill="#1e293b">MFI Accuracy</text>
  <text x="210" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Model Size</text>
  <text x="210" y="460" text-anchor="middle" font-size="8" fill="#64748b">(1/Params)</text>
  <text x="470" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Speed</text>
  <text x="470" y="460" text-anchor="middle" font-size="8" fill="#64748b">(1/Latency)</text>
  <text x="525" y="325" text-anchor="start" font-size="11" font-weight="600" fill="#1e293b">Robustness</text>
  <text x="525" y="337" text-anchor="start" font-size="8" fill="#64748b">(cross-distance)</text>

  <!-- MT-OPMNet (blue, filled) — scores: 95,98,85,92,90 % of max -->
  <polygon points="340,103.5 185.8,314.8 250.3,418.5 435.7,423.4 492.2,322.4" fill="#3b82f6" fill-opacity="0.2" stroke="#2563eb" stroke-width="2.5"/>
  <g fill="#2563eb">
    <circle cx="340" cy="103.5" r="5"/><circle cx="185.8" cy="314.8" r="5"/>
    <circle cx="250.3" cy="418.5" r="5"/><circle cx="435.7" cy="423.4" r="5"/>
    <circle cx="492.2" cy="322.4" r="5"/>
  </g>

  <!-- ST-OSNR+MFI (red, dashed) — scores: 80,82,55,60,78 -->
  <polygon points="340,129 221.9,302.1 283.4,375.2 408.3,363.0 460.8,302.1" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,4"/>
  <g fill="#dc2626">
    <circle cx="340" cy="129" r="4"/><circle cx="221.9" cy="302.1" r="4"/>
    <circle cx="283.4" cy="375.2" r="4"/><circle cx="408.3" cy="363.0" r="4"/>
    <circle cx="460.8" cy="302.1" r="4"/>
  </g>

  <!-- No-CAAM (purple) — scores: 72,82,88,90,75 -->
  <polygon points="340,142.6 221.9,302.1 243.3,411.0 432.6,420.0 478.7,311.8" fill="#7c3aed" fill-opacity="0.06" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,4"/>
  <g fill="#7c3aed">
    <circle cx="340" cy="142.6" r="3.5"/><circle cx="221.9" cy="302.1" r="3.5"/>
    <circle cx="243.3" cy="411.0" r="3.5"/><circle cx="432.6" cy="420.0" r="3.5"/>
    <circle cx="478.7" cy="311.8" r="3.5"/>
  </g>

  <!-- Legend -->
  <rect x="10" y="80" width="145" height="68" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="22" y1="97" x2="42" y2="97" stroke="#2563eb" stroke-width="2.5"/><circle cx="32" cy="97" r="3.5" fill="#2563eb"/><text x="50" y="101" font-size="9" fill="#1e293b" font-weight="600">MT-OPMNet</text>
  <line x1="22" y1="117" x2="42" y2="117" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="5,3"/><circle cx="32" cy="117" r="3" fill="#dc2626"/><text x="50" y="121" font-size="9" fill="#475569">ST Combined</text>
  <line x1="22" y1="137" x2="42" y2="137" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="32" cy="137" r="2.5" fill="#7c3aed"/><text x="50" y="141" font-size="9" fill="#475569">No CAAM</text>

  <text x="340" y="490" text-anchor="middle" font-size="9" fill="#64748b">MT-OPMNet achieves the best overall balance across all five evaluation dimensions</text>
</svg>
