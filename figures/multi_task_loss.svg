<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="osnrLoss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="mfiLoss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="uwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="totalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="predGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="focalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b91c1c"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="sh3" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2.5" flood-opacity="0.12"/>
    </filter>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" rx="16" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Multi-Task Loss with Uncertainty Weighting</text>
  <text x="430" y="58" text-anchor="middle" font-size="11" fill="#64748b">Homoscedastic uncertainty for automatic task balancing (Kendall et al., CVPR 2018)</text>

  <!-- ===== LEFT: OSNR Branch ===== -->
  <!-- Predictions -->
  <rect x="40" y="100" width="140" height="50" rx="8" fill="url(#predGrad)" filter="url(#sh3)"/>
  <text x="110" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">OSNR Prediction</text>
  <text x="110" y="140" text-anchor="middle" font-size="9" fill="#e2e8f0">ŷ (continuous)</text>

  <rect x="40" y="165" width="140" height="50" rx="8" fill="url(#predGrad)" filter="url(#sh3)"/>
  <text x="110" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">OSNR Ground Truth</text>
  <text x="110" y="205" text-anchor="middle" font-size="9" fill="#e2e8f0">y (continuous)</text>

  <!-- Arrows to MSE -->
  <line x1="180" y1="125" x2="240" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="180" y1="190" x2="240" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- MSE Loss -->
  <rect x="245" y="130" width="150" height="60" rx="10" fill="url(#osnrLoss)" filter="url(#sh3)"/>
  <text x="320" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">MSE Loss</text>
  <text x="320" y="175" text-anchor="middle" font-size="10" fill="#d1fae5">ℒ_osnr = ||ŷ - y||²</text>

  <!-- ===== RIGHT: MFI Branch ===== -->
  <rect x="530" y="100" width="140" height="50" rx="8" fill="url(#predGrad)" filter="url(#sh3)"/>
  <text x="600" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">MFI Logits</text>
  <text x="600" y="140" text-anchor="middle" font-size="9" fill="#e2e8f0">ẑ (5 classes)</text>

  <rect x="530" y="165" width="140" height="50" rx="8" fill="url(#predGrad)" filter="url(#sh3)"/>
  <text x="600" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">MFI Ground Truth</text>
  <text x="600" y="205" text-anchor="middle" font-size="9" fill="#e2e8f0">z (integer label)</text>

  <!-- Arrows to Focal -->
  <line x1="530" y1="125" x2="470" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="530" y1="190" x2="470" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Focal Loss -->
  <rect x="315" y="130" width="160" height="60" rx="10" fill="url(#focalGrad)" filter="url(#sh3)" x="465"/>
  <rect x="465" y="130" width="160" height="60" rx="10" fill="url(#focalGrad)" filter="url(#sh3)"/>
  <text x="545" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Focal Loss</text>
  <text x="545" y="175" text-anchor="middle" font-size="10" fill="#fecaca">ℒ_mfi = -(1-pₜ)ᵞ log(pₜ)</text>

  <!-- Arrows down to uncertainty -->
  <line x1="320" y1="190" x2="320" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="545" y1="190" x2="545" y2="260" stroke="#dc2626" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- ===== UNCERTAINTY WEIGHTING BOX ===== -->
  <rect x="120" y="265" width="620" height="130" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#sh3)" opacity="0.95"/>
  <text x="430" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Homoscedastic Uncertainty Weighting</text>

  <!-- Sigma OSNR -->
  <rect x="160" y="305" width="160" height="70" rx="10" fill="url(#uwGrad)" filter="url(#sh3)"/>
  <text x="240" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">σ²_osnr</text>
  <text x="240" y="350" text-anchor="middle" font-size="10" fill="#ede9fe">Learnable</text>
  <text x="240" y="366" text-anchor="middle" font-size="9" fill="#ddd6fe">log σ² (parameter)</text>

  <!-- Sigma MFI -->
  <rect x="540" y="305" width="160" height="70" rx="10" fill="url(#uwGrad)" filter="url(#sh3)"/>
  <text x="620" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">σ²_mfi</text>
  <text x="620" y="350" text-anchor="middle" font-size="10" fill="#ede9fe">Learnable</text>
  <text x="620" y="366" text-anchor="middle" font-size="9" fill="#ddd6fe">log σ² (parameter)</text>

  <!-- Formula in center -->
  <rect x="340" y="310" width="180" height="58" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="430" y="334" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">Combined Loss:</text>
  <text x="430" y="354" text-anchor="middle" font-size="10" fill="#5b21b6">1/(2σ₁²)·ℒ₁ + 1/(2σ₂²)·ℒ₂</text>
  <text x="430" y="365" text-anchor="middle" font-size="9" fill="#7c3aed">+ log σ₁ + log σ₂</text>

  <!-- Arrows down to total loss -->
  <line x1="240" y1="375" x2="370" y2="430" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="620" y1="375" x2="490" y2="430" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Total Loss -->
  <rect x="340" y="430" width="180" height="60" rx="12" fill="url(#totalGrad)" filter="url(#sh3)"/>
  <text x="430" y="456" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Total Loss</text>
  <text x="430" y="476" text-anchor="middle" font-size="10" fill="#bfdbfe">ℒ_total → Backprop</text>

  <!-- Gamma note -->
  <text x="430" y="510" text-anchor="middle" font-size="10" fill="#64748b">γ = 2.0 (focal focusing) | σ² learned jointly via gradient descent | No manual weight tuning needed</text>
</svg>
