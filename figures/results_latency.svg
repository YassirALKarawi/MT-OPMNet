<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="lt_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <clipPath id="lt_cp"><rect x="85" y="50" width="510" height="270"/></clipPath>
  </defs>
  <rect width="650" height="400" rx="14" fill="url(#lt_bg)"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Inference Latency vs. Batch Size (CPU)</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#64748b">MT-OPMNet achieves 0.61 ms/sample at batch 128 (paper Fig. 22)</text>

  <rect x="85" y="50" width="510" height="270" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="85" y1="104" x2="595" y2="104"/><line x1="85" y1="158" x2="595" y2="158"/>
    <line x1="85" y1="212" x2="595" y2="212"/><line x1="85" y1="266" x2="595" y2="266"/>
  </g>

  <!-- Y-axis (ms/sample) -->
  <text x="77" y="54" text-anchor="end" font-size="9" fill="#94a3b8">10.0</text>
  <text x="77" y="104" text-anchor="end" font-size="9" fill="#94a3b8">8.0</text>
  <text x="77" y="158" text-anchor="end" font-size="9" fill="#94a3b8">6.0</text>
  <text x="77" y="212" text-anchor="end" font-size="9" fill="#94a3b8">4.0</text>
  <text x="77" y="266" text-anchor="end" font-size="9" fill="#94a3b8">2.0</text>
  <text x="77" y="324" text-anchor="end" font-size="9" fill="#94a3b8">0.0</text>
  <text x="24" y="185" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,24,185)">Latency (ms/sample)</text>

  <!-- X-axis (batch size, log-like spacing) -->
  <text x="128" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">1</text>
  <text x="213" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">4</text>
  <text x="298" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">16</text>
  <text x="383" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">32</text>
  <text x="468" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">64</text>
  <text x="553" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">128</text>
  <text x="340" y="365" text-anchor="middle" font-size="11" fill="#475569">Batch Size</text>

  <!-- MT-OPMNet (blue): 4.8, 2.8, 1.5, 1.1, 0.85, 0.61 -->
  <polygon points="128,209 213,253 298,282 383,291 468,298 553,304 553,320 468,320 383,320 298,320 213,320 128,320" fill="#2563eb" opacity="0.08" clip-path="url(#lt_cp)"/>
  <polyline points="128,209 213,253 298,282 383,291 468,298 553,304" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" clip-path="url(#lt_cp)"/>
  <g fill="#fff" stroke="#2563eb" stroke-width="2.5" clip-path="url(#lt_cp)">
    <circle cx="128" cy="209" r="4.5"/><circle cx="213" cy="253" r="4.5"/><circle cx="298" cy="282" r="4.5"/>
    <circle cx="383" cy="291" r="4.5"/><circle cx="468" cy="298" r="4.5"/><circle cx="553" cy="304" r="4.5"/>
  </g>
  <text x="140" y="203" font-size="8" font-weight="600" fill="#2563eb">4.8</text>
  <text x="563" y="298" font-size="8" font-weight="700" fill="#2563eb">0.61</text>

  <!-- ST-OSNR + ST-MFI (red): 9.5, 5.2, 2.8, 2.0, 1.5, 1.1 -->
  <polyline points="128,78 213,192 298,253 383,266 468,280 553,291" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="8,4" stroke-linecap="round" clip-path="url(#lt_cp)"/>
  <g fill="#fff" stroke="#dc2626" stroke-width="2" clip-path="url(#lt_cp)">
    <circle cx="128" cy="78" r="4"/><circle cx="213" cy="192" r="4"/><circle cx="298" cy="253" r="4"/>
    <circle cx="383" cy="266" r="4"/><circle cx="468" cy="280" r="4"/><circle cx="553" cy="291" r="4"/>
  </g>
  <text x="140" y="72" font-size="8" font-weight="600" fill="#dc2626">9.5</text>
  <text x="563" y="285" font-size="8" font-weight="600" fill="#dc2626">1.1</text>

  <!-- Legend -->
  <rect x="360" y="58" width="225" height="42" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.95"/>
  <line x1="372" y1="72" x2="395" y2="72" stroke="#2563eb" stroke-width="2.5"/><circle cx="383" cy="72" r="3" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="402" y="76" font-size="9" fill="#1e293b" font-weight="600">MT-OPMNet</text>
  <line x1="372" y1="90" x2="395" y2="90" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/><circle cx="383" cy="90" r="3" fill="#fff" stroke="#dc2626" stroke-width="1.5"/><text x="402" y="94" font-size="9" fill="#475569">ST-OSNR + ST-MFI</text>

  <text x="340" y="390" text-anchor="middle" font-size="9" fill="#64748b">MT-OPMNet: 49.5% faster at batch 1 (4.8 vs 9.5 ms); 44.5% faster at batch 128 (0.61 vs 1.1 ms)</text>
</svg>
