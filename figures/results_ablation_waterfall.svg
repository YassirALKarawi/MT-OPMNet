<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="wf_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="wf_sh" x="-2%" y="-3%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="700" height="380" rx="14" fill="url(#wf_bg)"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Ablation Waterfall: Cumulative OSNR RMSE Improvement</text>
  <text x="350" y="42" text-anchor="middle" font-size="10" fill="#64748b">28 GBd — progressive addition of each component (paper Fig. ablation waterfall)</text>

  <rect x="80" y="55" width="560" height="270" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="4"/>

  <!-- Y-axis -->
  <text x="72" y="60" text-anchor="end" font-size="9" fill="#94a3b8">1.30</text>
  <text x="72" y="122" text-anchor="end" font-size="9" fill="#94a3b8">1.15</text>
  <text x="72" y="184" text-anchor="end" font-size="9" fill="#94a3b8">1.00</text>
  <text x="72" y="246" text-anchor="end" font-size="9" fill="#94a3b8">0.85</text>
  <text x="72" y="310" text-anchor="end" font-size="9" fill="#94a3b8">0.70</text>
  <text x="24" y="185" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,24,185)">OSNR RMSE (dB)</text>

  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="80" y1="122" x2="640" y2="122"/><line x1="80" y1="184" x2="640" y2="184"/>
    <line x1="80" y1="246" x2="640" y2="246"/>
  </g>

  <!-- Baseline: No CAAM + MSE + Fixed Weights = 1.25 dB -->
  <!-- Scale: 1.30=y55, 0.70=y310. Range=0.60, height=255. Per 0.01 = 4.25px -->
  <!-- 1.25 → y=55+(1.30-1.25)/0.60*255 = 55+21.25 = 76.25 -->
  <!-- 1.10 → y=55+(1.30-1.10)/0.60*255 = 55+85 = 140 -->
  <!-- 1.05 → y=55+(1.30-1.05)/0.60*255 = 55+106.25 = 161.25 -->
  <!-- 0.85 → y=55+(1.30-0.85)/0.60*255 = 55+191.25 = 246.25 -->

  <!-- Bar 1: Baseline = 1.25 (gray, starting from bottom) -->
  <g filter="url(#wf_sh)">
    <rect x="110" y="76" width="90" height="249" rx="5" fill="#94a3b8"/>
  </g>
  <text x="155" y="69" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">1.25</text>
  <text x="155" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Baseline</text>
  <text x="155" y="352" text-anchor="middle" font-size="7" fill="#94a3b8">(no CAAM, MSE,</text>
  <text x="155" y="362" text-anchor="middle" font-size="7" fill="#94a3b8">fixed weights)</text>

  <!-- Connector line -->
  <line x1="200" y1="76" x2="255" y2="76" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 2: +CAAM → 1.10 (drop of 0.15, green block from 1.25 to 1.10) -->
  <g filter="url(#wf_sh)">
    <rect x="255" y="76" width="90" height="64" rx="5" fill="#059669" opacity="0.8"/>
    <rect x="255" y="140" width="90" height="185" rx="5" fill="#94a3b8" opacity="0.3"/>
  </g>
  <text x="300" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">−0.15</text>
  <text x="300" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">1.10</text>
  <text x="300" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">+ CAAM</text>

  <line x1="345" y1="140" x2="400" y2="140" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 3: +Smooth-L1 → 1.05 (drop of 0.05) -->
  <g filter="url(#wf_sh)">
    <rect x="400" y="140" width="90" height="21" rx="5" fill="#2563eb" opacity="0.7"/>
    <rect x="400" y="161" width="90" height="164" rx="5" fill="#94a3b8" opacity="0.3"/>
  </g>
  <text x="445" y="157" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">−0.05</text>
  <text x="445" y="177" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">1.05</text>
  <text x="445" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">+ Smooth-L1</text>

  <line x1="490" y1="161" x2="545" y2="161" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 4: +Uncertainty Weighting → 0.85 (drop of 0.20) -->
  <g filter="url(#wf_sh)">
    <rect x="545" y="161" width="90" height="85" rx="5" fill="#7c3aed" opacity="0.8"/>
    <rect x="545" y="246" width="90" height="79" rx="5" fill="#94a3b8" opacity="0.3"/>
  </g>
  <text x="590" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">−0.20</text>
  <text x="590" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">0.85</text>
  <text x="590" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">+ Uncertainty</text>
  <text x="590" y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Weighting</text>

  <!-- Final target line -->
  <line x1="80" y1="246" x2="640" y2="246" stroke="#2563eb" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="644" y="242" font-size="7" fill="#2563eb">0.85 dB</text>

  <text x="350" y="376" text-anchor="middle" font-size="9" fill="#64748b">Uncertainty weighting provides the largest single improvement (−0.20 dB); CAAM adds −0.15 dB</text>
</svg>
