<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="cd_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <clipPath id="cd_cp"><rect x="85" y="50" width="510" height="270"/></clipPath>
  </defs>
  <rect width="650" height="400" rx="14" fill="url(#cd_bg)"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">CDF of Absolute OSNR Estimation Error</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#64748b">28 GBd — MT-OPMNet achieves tightest error distribution (paper Fig. 23)</text>

  <rect x="85" y="50" width="510" height="270" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="85" y1="104" x2="595" y2="104"/><line x1="85" y1="158" x2="595" y2="158"/>
    <line x1="85" y1="212" x2="595" y2="212"/><line x1="85" y1="266" x2="595" y2="266"/>
  </g>

  <!-- Y-axis (CDF 0-1) -->
  <text x="77" y="54" text-anchor="end" font-size="9" fill="#94a3b8">1.0</text>
  <text x="77" y="104" text-anchor="end" font-size="9" fill="#94a3b8">0.8</text>
  <text x="77" y="158" text-anchor="end" font-size="9" fill="#94a3b8">0.6</text>
  <text x="77" y="212" text-anchor="end" font-size="9" fill="#94a3b8">0.4</text>
  <text x="77" y="266" text-anchor="end" font-size="9" fill="#94a3b8">0.2</text>
  <text x="77" y="324" text-anchor="end" font-size="9" fill="#94a3b8">0.0</text>
  <text x="24" y="185" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,24,185)">CDF</text>

  <!-- X-axis (error dB) -->
  <text x="85" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">0.0</text>
  <text x="187" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">0.5</text>
  <text x="289" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">1.0</text>
  <text x="391" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">1.5</text>
  <text x="493" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">2.0</text>
  <text x="595" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">2.5</text>
  <text x="340" y="365" text-anchor="middle" font-size="11" fill="#475569">|OSNR Error| (dB)</text>

  <!-- Fill under MT-OPMNet -->
  <polygon points="85,320 105,310 130,282 160,235 187,178 215,128 240,92 270,70 300,60 340,55 380,52 430,51 500,50 595,50 595,320" fill="#2563eb" opacity="0.06" clip-path="url(#cd_cp)"/>

  <!-- MT-OPMNet (blue, steepest) -->
  <polyline points="85,320 105,310 130,282 160,235 187,178 215,128 240,92 270,70 300,60 340,55 380,52 430,51 500,50 595,50" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" clip-path="url(#cd_cp)"/>

  <!-- No-CAAM (purple) -->
  <polyline points="85,320 110,312 140,290 175,250 210,198 245,152 280,115 315,88 350,72 390,62 440,56 500,53 560,51 595,50" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8,4" stroke-linecap="round" clip-path="url(#cd_cp)"/>

  <!-- ST-OSNR (red) -->
  <polyline points="85,320 115,314 150,296 190,262 230,218 270,172 310,135 350,105 390,85 435,72 485,62 540,56 580,53 595,51" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" stroke-linecap="round" clip-path="url(#cd_cp)"/>

  <!-- MT-ANN (gray) -->
  <polyline points="85,320 120,316 160,300 205,272 250,235 295,192 340,155 385,125 430,102 478,85 530,72 570,65 595,60" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" stroke-linecap="round" clip-path="url(#cd_cp)"/>

  <!-- 90% line -->
  <line x1="85" y1="77" x2="595" y2="77" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="590" y="72" text-anchor="end" font-size="7" fill="#f59e0b">90%</text>

  <!-- Legend -->
  <rect x="340" y="225" width="245" height="88" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.95"/>
  <line x1="352" y1="242" x2="375" y2="242" stroke="#2563eb" stroke-width="3"/><text x="382" y="246" font-size="9" fill="#1e293b" font-weight="600">MT-OPMNet (90% &lt; 1.2 dB)</text>
  <line x1="352" y1="260" x2="375" y2="260" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3"/><text x="382" y="264" font-size="9" fill="#475569">No CAAM (90% &lt; 1.5 dB)</text>
  <line x1="352" y1="278" x2="375" y2="278" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/><text x="382" y="282" font-size="9" fill="#475569">ST-OSNR (90% &lt; 1.7 dB)</text>
  <line x1="352" y1="296" x2="375" y2="296" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/><text x="382" y="300" font-size="9" fill="#94a3b8">MT-ANN [16] (90% &lt; 2.0 dB)</text>

  <text x="340" y="390" text-anchor="middle" font-size="9" fill="#64748b">Steeper CDF curve indicates tighter error concentration — MT-OPMNet outperforms all baselines</text>
</svg>
