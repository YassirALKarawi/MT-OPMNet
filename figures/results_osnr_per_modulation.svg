<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bx_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="650" height="400" rx="12" fill="url(#bx_bg)"/>

  <text x="325" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">OSNR Absolute Error per Modulation Format</text>

  <!-- Plot area -->
  <rect x="80" y="50" width="520" height="280" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="4"/>

  <!-- Grid -->
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="80" y1="106" x2="600" y2="106"/><line x1="80" y1="162" x2="600" y2="162"/>
    <line x1="80" y1="218" x2="600" y2="218"/><line x1="80" y1="274" x2="600" y2="274"/>
  </g>

  <!-- Y-axis -->
  <text x="73" y="54" text-anchor="end" font-size="9" fill="#94a3b8">2.5</text>
  <text x="73" y="110" text-anchor="end" font-size="9" fill="#94a3b8">2.0</text>
  <text x="73" y="166" text-anchor="end" font-size="9" fill="#94a3b8">1.5</text>
  <text x="73" y="222" text-anchor="end" font-size="9" fill="#94a3b8">1.0</text>
  <text x="73" y="278" text-anchor="end" font-size="9" fill="#94a3b8">0.5</text>
  <text x="73" y="334" text-anchor="end" font-size="9" fill="#94a3b8">0.0</text>
  <text x="22" y="190" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,22,190)">|OSNR Error| (dB)</text>

  <!-- Box plots: each box at x center, width 60 -->
  <!-- OOK: median=0.28, Q1=0.12, Q3=0.52, whisker_lo=0.02, whisker_hi=0.95 -->
  <line x1="164" y1="95" x2="164" y2="130" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="164" y1="282" x2="164" y2="328" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="134" y="130" width="60" height="152" rx="4" fill="#2563eb" opacity="0.25" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="134" y1="298" x2="194" y2="298" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="144" y1="95" x2="184" y2="95" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="144" y1="328" x2="184" y2="328" stroke="#2563eb" stroke-width="1.5"/>

  <!-- DPSK: median=0.32, Q1=0.15, Q3=0.55 -->
  <line x1="268" y1="88" x2="268" y2="124" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="268" y1="278" x2="268" y2="324" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="238" y="124" width="60" height="154" rx="4" fill="#2563eb" opacity="0.25" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="238" y1="294" x2="298" y2="294" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="248" y1="88" x2="288" y2="88" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="248" y1="324" x2="288" y2="324" stroke="#2563eb" stroke-width="1.5"/>

  <!-- DQPSK: median=0.35, Q1=0.18, Q3=0.58 -->
  <line x1="372" y1="82" x2="372" y2="118" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="372" y1="272" x2="372" y2="320" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="342" y="118" width="60" height="154" rx="4" fill="#0891b2" opacity="0.25" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="342" y1="290" x2="402" y2="290" stroke="#0891b2" stroke-width="2.5"/>
  <line x1="352" y1="82" x2="392" y2="82" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="352" y1="320" x2="392" y2="320" stroke="#0891b2" stroke-width="1.5"/>

  <!-- 8QAM: median=0.42, Q1=0.20, Q3=0.68 -->
  <line x1="476" y1="72" x2="476" y2="102" stroke="#059669" stroke-width="1.5"/>
  <line x1="476" y1="260" x2="476" y2="312" stroke="#059669" stroke-width="1.5"/>
  <rect x="446" y="102" width="60" height="158" rx="4" fill="#059669" opacity="0.25" stroke="#059669" stroke-width="1.5"/>
  <line x1="446" y1="282" x2="506" y2="282" stroke="#059669" stroke-width="2.5"/>
  <line x1="456" y1="72" x2="496" y2="72" stroke="#059669" stroke-width="1.5"/>
  <line x1="456" y1="312" x2="496" y2="312" stroke="#059669" stroke-width="1.5"/>

  <!-- 16QAM: median=0.48, Q1=0.24, Q3=0.78 -->
  <line x1="580" y1="62" x2="580" y2="90" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="580" y1="248" x2="580" y2="302" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="550" y="90" width="60" height="158" rx="4" fill="#dc2626" opacity="0.25" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="550" y1="274" x2="610" y2="274" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="560" y1="62" x2="600" y2="62" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="560" y1="302" x2="600" y2="302" stroke="#dc2626" stroke-width="1.5"/>

  <!-- X-axis labels -->
  <text x="164" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">OOK</text>
  <text x="268" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">DPSK</text>
  <text x="372" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#0891b2">DQPSK</text>
  <text x="476" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">8QAM</text>
  <text x="580" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">16QAM</text>

  <!-- Median MAE values -->
  <text x="164" y="366" text-anchor="middle" font-size="9" fill="#64748b">0.28 dB</text>
  <text x="268" y="366" text-anchor="middle" font-size="9" fill="#64748b">0.32 dB</text>
  <text x="372" y="366" text-anchor="middle" font-size="9" fill="#64748b">0.35 dB</text>
  <text x="476" y="366" text-anchor="middle" font-size="9" fill="#64748b">0.42 dB</text>
  <text x="580" y="366" text-anchor="middle" font-size="9" fill="#64748b">0.48 dB</text>

  <text x="325" y="392" text-anchor="middle" font-size="9" fill="#64748b">Higher-order modulations show slightly larger OSNR errors due to denser constellation spacing</text>
</svg>
