<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="opGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="fcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="actGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="sigGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="mulGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="sh2" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2.5" flood-opacity="0.12"/>
    </filter>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" rx="16" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Channel-Aware Attention Module (CAAM)</text>
  <text x="410" y="58" text-anchor="middle" font-size="11" fill="#64748b">Squeeze-and-Excitation style adaptive feature recalibration</text>

  <!-- Input Feature Map -->
  <rect x="30" y="180" width="130" height="80" rx="10" fill="url(#opGrad)" filter="url(#sh2)"/>
  <text x="95" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Input F</text>
  <text x="95" y="234" text-anchor="middle" font-size="10" fill="#ede9fe">(B × C × L)</text>

  <!-- Arrow -->
  <line x1="160" y1="220" x2="195" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Global Avg Pool (Squeeze) -->
  <rect x="200" y="185" width="120" height="70" rx="10" fill="url(#actGrad)" filter="url(#sh2)"/>
  <text x="260" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Global</text>
  <text x="260" y="233" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">AvgPool</text>
  <text x="260" y="250" text-anchor="middle" font-size="9" fill="#e0f2fe">Squeeze</text>

  <!-- Arrow -->
  <line x1="320" y1="220" x2="355" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- FC1 (reduce) -->
  <rect x="360" y="185" width="100" height="70" rx="10" fill="url(#fcGrad)" filter="url(#sh2)"/>
  <text x="410" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">FC₁</text>
  <text x="410" y="233" text-anchor="middle" font-size="10" fill="#c7d2fe">C → C/r</text>
  <text x="410" y="249" text-anchor="middle" font-size="9" fill="#c7d2fe">+ ReLU</text>

  <!-- Arrow -->
  <line x1="460" y1="220" x2="495" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- FC2 (expand) -->
  <rect x="500" y="185" width="100" height="70" rx="10" fill="url(#fcGrad)" filter="url(#sh2)"/>
  <text x="550" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">FC₂</text>
  <text x="550" y="233" text-anchor="middle" font-size="10" fill="#c7d2fe">C/r → C</text>

  <!-- Arrow -->
  <line x1="600" y1="220" x2="625" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Sigmoid -->
  <rect x="630" y="190" width="80" height="60" rx="10" fill="url(#sigGrad)" filter="url(#sh2)"/>
  <text x="670" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">σ</text>
  <text x="670" y="238" text-anchor="middle" font-size="9" fill="#fff3e0">Sigmoid</text>

  <!-- Arrow down from Sigmoid to Multiply -->
  <line x1="670" y1="250" x2="670" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Multiply node -->
  <circle cx="670" cy="360" r="30" fill="url(#mulGrad)" filter="url(#sh2)"/>
  <text x="670" y="366" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">×</text>

  <!-- Skip connection from Input to Multiply -->
  <path d="M 95 260 L 95 360 L 635 360" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arr2)"/>
  <text x="360" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Skip Connection (Identity)</text>

  <!-- Arrow from Multiply to Output -->
  <line x1="700" y1="360" x2="740" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Output -->
  <rect x="745" y="330" width="60" height="60" rx="10" fill="url(#opGrad)" filter="url(#sh2)"/>
  <text x="775" y="356" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">F'</text>
  <text x="775" y="374" text-anchor="middle" font-size="9" fill="#ede9fe">(B×C×L)</text>

  <!-- Flow annotation -->
  <rect x="150" y="400" width="530" height="55" rx="10" fill="#fff" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
  <text x="415" y="420" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">Processing Flow:</text>
  <text x="415" y="440" text-anchor="middle" font-size="11" fill="#5b21b6">F ∈ ℝ<tspan baseline-shift="super" font-size="8">B×C×L</tspan> → Squeeze → FC₁(ReLU) → FC₂(Sigmoid) → Channel Weights → F' = F ⊙ W</text>

  <!-- Parameters note -->
  <text x="410" y="472" text-anchor="middle" font-size="10" fill="#64748b">r = 4 (reduction ratio) | C = 128 channels | Learnable channel importance weights</text>
</svg>
