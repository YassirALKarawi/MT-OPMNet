<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="cm_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="cm_purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cm_indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cm_cyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="cm_orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="cm_green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="cm_sh" x="-3%" y="-5%" width="106%" height="115%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="cm_arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="cm_arr_p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="820" height="360" rx="14" fill="url(#cm_bg)"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Channel-Aware Attention Module (CAAM)</text>
  <text x="410" y="50" text-anchor="middle" font-size="11" fill="#64748b">Squeeze-and-Excitation style adaptive feature recalibration</text>

  <!-- ====== Main Flow ====== -->

  <!-- Input F -->
  <g filter="url(#cm_sh)">
    <rect x="22" y="80" width="110" height="60" rx="10" fill="url(#cm_purple)"/>
  </g>
  <text x="77" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Input F</text>
  <text x="77" y="124" text-anchor="middle" font-size="9" fill="#ddd6fe">(B × 128 × L)</text>

  <!-- Arrow -->
  <line x1="137" y1="110" x2="170" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#cm_arr)"/>

  <!-- Squeeze: GAP -->
  <g filter="url(#cm_sh)">
    <rect x="175" y="80" width="110" height="60" rx="10" fill="url(#cm_cyan)"/>
  </g>
  <text x="230" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Squeeze</text>
  <text x="230" y="118" text-anchor="middle" font-size="10" fill="#a5f3fc">Global</text>
  <text x="230" y="132" text-anchor="middle" font-size="10" fill="#a5f3fc">AvgPool1d</text>

  <!-- Arrow -->
  <line x1="290" y1="110" x2="323" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#cm_arr)"/>
  <!-- Dimension -->
  <rect x="293" y="90" width="28" height="15" rx="3" fill="#ecfeff" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="307" y="101" text-anchor="middle" font-size="7" fill="#0891b2">B×C</text>

  <!-- Excitation: FC1 + ReLU -->
  <g filter="url(#cm_sh)">
    <rect x="328" y="80" width="100" height="60" rx="10" fill="url(#cm_indigo)"/>
  </g>
  <text x="378" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">FC₁</text>
  <text x="378" y="118" text-anchor="middle" font-size="9" fill="#c7d2fe">128 → 32</text>
  <text x="378" y="132" text-anchor="middle" font-size="9" fill="#a5b4fc">+ ReLU</text>

  <!-- Arrow -->
  <line x1="433" y1="110" x2="463" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#cm_arr)"/>

  <!-- FC2 + Sigmoid -->
  <g filter="url(#cm_sh)">
    <rect x="468" y="80" width="100" height="60" rx="10" fill="url(#cm_indigo)"/>
  </g>
  <text x="518" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">FC₂</text>
  <text x="518" y="118" text-anchor="middle" font-size="9" fill="#c7d2fe">32 → 128</text>
  <text x="518" y="132" text-anchor="middle" font-size="9" fill="#a5b4fc">+ Sigmoid</text>

  <!-- Arrow down -->
  <line x1="518" y1="140" x2="518" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#cm_arr)"/>
  <!-- Label W -->
  <rect x="526" y="148" width="45" height="15" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="548" y="159" text-anchor="middle" font-size="8" font-weight="600" fill="#7c3aed">W (σ)</text>

  <!-- Reshape note -->
  <text x="556" y="110" text-anchor="start" font-size="8" fill="#64748b">→ (B×C×1)</text>

  <!-- ====== Element-wise Multiply ====== -->
  <g filter="url(#cm_sh)">
    <circle cx="518" cy="200" r="26" fill="url(#cm_green)"/>
  </g>
  <text x="518" y="207" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">⊙</text>

  <!-- Skip connection from Input to Multiply -->
  <path d="M 77 140 L 77 200 L 487 200" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#cm_arr_p)"/>
  <!-- Label on skip -->
  <rect x="240" y="187" width="100" height="18" rx="4" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="290" y="200" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">Identity (F)</text>

  <!-- Arrow out -->
  <line x1="549" y1="200" x2="590" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#cm_arr)"/>

  <!-- Output F' -->
  <g filter="url(#cm_sh)">
    <rect x="595" y="170" width="110" height="60" rx="10" fill="url(#cm_purple)"/>
  </g>
  <text x="650" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Output F'</text>
  <text x="650" y="216" text-anchor="middle" font-size="9" fill="#ddd6fe">(B × 128 × L)</text>

  <!-- ====== Formula Box ====== -->
  <g filter="url(#cm_sh)">
    <rect x="80" y="255" width="660" height="85" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="410" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Mathematical Formulation</text>
  <line x1="140" y1="290" x2="680" y2="290" stroke="#e2e8f0" stroke-width="1"/>
  <text x="230" y="312" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Squeeze:</text>
  <text x="370" y="312" text-anchor="middle" font-size="11" fill="#475569">z<tspan font-size="8" dy="2">c</tspan><tspan dy="-2"> = (1/L) Σ F</tspan><tspan font-size="8" dy="2">c</tspan><tspan dy="-2">(i)</tspan></text>
  <text x="230" y="332" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Excite:</text>
  <text x="400" y="332" text-anchor="middle" font-size="11" fill="#475569">W = σ(W₂ · ReLU(W₁ · z))</text>
  <text x="620" y="312" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Scale:</text>
  <text x="620" y="332" text-anchor="middle" font-size="11" fill="#475569">F' = F ⊙ W</text>
  <text x="410" y="335" text-anchor="middle" font-size="1" fill="#fff">.</text>
</svg>
