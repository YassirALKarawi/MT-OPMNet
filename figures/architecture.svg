<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="ar_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="ar_input" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="ar_conv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="ar_caam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="ar_pool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="ar_osnr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="ar_mfi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="ar_sh" x="-4%" y="-4%" width="108%" height="114%">
      <feDropShadow dx="1" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="ar_arr" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect width="720" height="900" rx="16" fill="url(#ar_bg)"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">MT-OPMNet Architecture</text>
  <text x="360" y="58" text-anchor="middle" font-size="11" fill="#64748b">Multi-Task Optical Performance Monitoring Network</text>

  <!-- ========== INPUT ========== -->
  <g filter="url(#ar_sh)">
    <rect x="210" y="80" width="300" height="60" rx="12" fill="url(#ar_input)"/>
  </g>
  <text x="360" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Amplitude Histogram (AAH)</text>
  <text x="360" y="126" text-anchor="middle" font-size="11" fill="#c7d2fe">(Batch × 1 × 100)</text>

  <!-- Arrow -->
  <line x1="360" y1="140" x2="360" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#ar_arr)"/>

  <!-- ========== SHARED BACKBONE CONTAINER ========== -->
  <rect x="100" y="172" width="520" height="320" rx="14" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,5" opacity="0.35"/>
  <text x="120" y="194" font-size="10" font-weight="700" fill="#3b82f6" letter-spacing="1.5" opacity="0.6">SHARED BACKBONE</text>

  <!-- Conv Block 1 -->
  <g filter="url(#ar_sh)">
    <rect x="170" y="206" width="380" height="58" rx="10" fill="url(#ar_conv)"/>
  </g>
  <text x="360" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Conv1D Block 1</text>
  <text x="360" y="250" text-anchor="middle" font-size="10" fill="#bfdbfe">Conv1d(1→32, k=7, pad=3) → BatchNorm → ReLU → Dropout(0.2)</text>
  <!-- Dimension annotation -->
  <rect x="565" y="218" width="50" height="20" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="590" y="232" text-anchor="middle" font-size="8" fill="#2563eb">32×100</text>

  <!-- Arrow -->
  <line x1="360" y1="264" x2="360" y2="282" stroke="#475569" stroke-width="1.5" marker-end="url(#ar_arr)"/>

  <!-- Conv Block 2 -->
  <g filter="url(#ar_sh)">
    <rect x="170" y="286" width="380" height="58" rx="10" fill="url(#ar_conv)"/>
  </g>
  <text x="360" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Conv1D Block 2</text>
  <text x="360" y="330" text-anchor="middle" font-size="10" fill="#bfdbfe">Conv1d(32→64, k=5, pad=2) → BatchNorm → ReLU → Dropout(0.2)</text>
  <rect x="565" y="298" width="50" height="20" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="590" y="312" text-anchor="middle" font-size="8" fill="#2563eb">64×100</text>

  <!-- Arrow -->
  <line x1="360" y1="344" x2="360" y2="362" stroke="#475569" stroke-width="1.5" marker-end="url(#ar_arr)"/>

  <!-- Conv Block 3 -->
  <g filter="url(#ar_sh)">
    <rect x="170" y="366" width="380" height="58" rx="10" fill="url(#ar_conv)"/>
  </g>
  <text x="360" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Conv1D Block 3</text>
  <text x="360" y="410" text-anchor="middle" font-size="10" fill="#bfdbfe">Conv1d(64→128, k=3, pad=1) → BatchNorm → ReLU → Dropout(0.2)</text>
  <rect x="565" y="378" width="50" height="20" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="590" y="392" text-anchor="middle" font-size="8" fill="#2563eb">128×100</text>

  <!-- Arrow -->
  <line x1="360" y1="424" x2="360" y2="452" stroke="#475569" stroke-width="2" marker-end="url(#ar_arr)"/>

  <!-- ========== CAAM ========== -->
  <g filter="url(#ar_sh)">
    <rect x="195" y="456" width="330" height="58" rx="10" fill="url(#ar_caam)"/>
  </g>
  <text x="360" y="480" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Channel-Aware Attention (CAAM)</text>
  <text x="360" y="500" text-anchor="middle" font-size="10" fill="#ddd6fe">GAP → FC(128→32) → ReLU → FC(32→128) → Sigmoid → Scale</text>
  <rect x="540" y="468" width="50" height="20" rx="5" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="565" y="482" text-anchor="middle" font-size="8" fill="#7c3aed">128×100</text>

  <!-- Arrow -->
  <line x1="360" y1="514" x2="360" y2="542" stroke="#475569" stroke-width="2" marker-end="url(#ar_arr)"/>

  <!-- ========== GLOBAL AVG POOL ========== -->
  <g filter="url(#ar_sh)">
    <rect x="230" y="546" width="260" height="48" rx="10" fill="url(#ar_pool)"/>
  </g>
  <text x="360" y="570" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Global Average Pooling</text>
  <text x="360" y="586" text-anchor="middle" font-size="10" fill="#bae6fd">(Batch × 128)</text>

  <!-- Split -->
  <line x1="360" y1="594" x2="360" y2="620" stroke="#475569" stroke-width="2"/>

  <!-- Left branch (OSNR) -->
  <line x1="360" y1="620" x2="210" y2="620" stroke="#059669" stroke-width="2.5"/>
  <line x1="210" y1="620" x2="210" y2="650" stroke="#059669" stroke-width="2.5" marker-end="url(#ar_arr)"/>

  <!-- Right branch (MFI) -->
  <line x1="360" y1="620" x2="510" y2="620" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="510" y1="620" x2="510" y2="650" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ar_arr)"/>

  <!-- ========== OSNR HEAD ========== -->
  <g filter="url(#ar_sh)">
    <rect x="100" y="655" width="220" height="140" rx="12" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  </g>
  <rect x="100" y="655" width="220" height="32" rx="12" fill="url(#ar_osnr)"/>
  <rect x="100" y="675" width="220" height="12" fill="url(#ar_osnr)"/>
  <text x="210" y="677" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">OSNR Head</text>
  <text x="210" y="710" text-anchor="middle" font-size="11" fill="#475569">Linear(128 → 64)</text>
  <text x="210" y="728" text-anchor="middle" font-size="11" fill="#475569">ReLU + Dropout(0.3)</text>
  <text x="210" y="746" text-anchor="middle" font-size="11" fill="#475569">Linear(64 → 1)</text>
  <rect x="155" y="762" width="110" height="22" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="210" y="778" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Regression</text>

  <!-- ========== MFI HEAD ========== -->
  <g filter="url(#ar_sh)">
    <rect x="400" y="655" width="220" height="140" rx="12" fill="#fff" stroke="#dc2626" stroke-width="2.5"/>
  </g>
  <rect x="400" y="655" width="220" height="32" rx="12" fill="url(#ar_mfi)"/>
  <rect x="400" y="675" width="220" height="12" fill="url(#ar_mfi)"/>
  <text x="510" y="677" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">MFI Head</text>
  <text x="510" y="710" text-anchor="middle" font-size="11" fill="#475569">Linear(128 → 64)</text>
  <text x="510" y="728" text-anchor="middle" font-size="11" fill="#475569">ReLU + Dropout(0.3)</text>
  <text x="510" y="746" text-anchor="middle" font-size="11" fill="#475569">Linear(64 → 5)</text>
  <rect x="455" y="762" width="110" height="22" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="510" y="778" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Classification</text>

  <!-- Output arrows -->
  <line x1="210" y1="795" x2="210" y2="830" stroke="#059669" stroke-width="2" marker-end="url(#ar_arr)"/>
  <line x1="510" y1="795" x2="510" y2="830" stroke="#dc2626" stroke-width="2" marker-end="url(#ar_arr)"/>

  <!-- Output labels -->
  <g filter="url(#ar_sh)">
    <rect x="140" y="835" width="140" height="44" rx="10" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  </g>
  <text x="210" y="856" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">OSNR (dB)</text>
  <text x="210" y="872" text-anchor="middle" font-size="9" fill="#6b7280">Continuous value</text>

  <g filter="url(#ar_sh)">
    <rect x="440" y="835" width="140" height="44" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="510" y="856" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">MFI Class</text>
  <text x="510" y="872" text-anchor="middle" font-size="9" fill="#6b7280">5 format classes</text>
</svg>
