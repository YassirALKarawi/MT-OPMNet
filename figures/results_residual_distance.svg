<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="re_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <clipPath id="re_cp"><rect x="85" y="50" width="520" height="270"/></clipPath>
  </defs>
  <rect width="660" height="400" rx="14" fill="url(#re_bg)"/>
  <text x="345" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">OSNR Estimation Residual vs. Distance</text>
  <text x="345" y="44" text-anchor="middle" font-size="10" fill="#64748b">28 GBd — mean ± 1σ confirms unbiased estimation (paper Fig. 8)</text>

  <rect x="85" y="50" width="520" height="270" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="85" y1="105" x2="605" y2="105"/><line x1="85" y1="160" x2="605" y2="160"/>
    <line x1="85" y1="215" x2="605" y2="215"/><line x1="85" y1="270" x2="605" y2="270"/>
  </g>

  <!-- Y-axis -->
  <text x="77" y="54" text-anchor="end" font-size="9" fill="#94a3b8">2.0</text>
  <text x="77" y="105" text-anchor="end" font-size="9" fill="#94a3b8">1.0</text>
  <text x="77" y="160" text-anchor="end" font-size="9" fill="#94a3b8">0.0</text>
  <text x="77" y="215" text-anchor="end" font-size="9" fill="#94a3b8">−1.0</text>
  <text x="77" y="270" text-anchor="end" font-size="9" fill="#94a3b8">−2.0</text>
  <text x="77" y="324" text-anchor="end" font-size="9" fill="#94a3b8">−3.0</text>
  <text x="24" y="185" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,24,185)">Residual (dB)</text>

  <!-- X-axis -->
  <text x="128" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">500</text>
  <text x="232" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">1000</text>
  <text x="336" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">1500</text>
  <text x="440" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">2000</text>
  <text x="544" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">2500</text>
  <text x="605" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">3000</text>
  <text x="345" y="362" text-anchor="middle" font-size="11" fill="#475569">Transmission Distance (km)</text>

  <!-- Zero line -->
  <line x1="85" y1="160" x2="605" y2="160" stroke="#dc2626" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ±1σ shaded band -->
  <polygon points="128,108 232,112 336,105 440,110 544,114 605,112 605,208 544,206 440,210 336,215 232,208 128,212" fill="#3b82f6" opacity="0.12" clip-path="url(#re_cp)"/>

  <!-- Mean line -->
  <polyline points="128,160 232,158 336,162 440,159 544,161 605,160" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" clip-path="url(#re_cp)"/>
  <g fill="#fff" stroke="#2563eb" stroke-width="2.5">
    <circle cx="128" cy="160" r="5"/><circle cx="232" cy="158" r="5"/><circle cx="336" cy="162" r="5"/>
    <circle cx="440" cy="159" r="5"/><circle cx="544" cy="161" r="5"/><circle cx="605" cy="160" r="5"/>
  </g>

  <!-- Mean values on points -->
  <text x="128" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">+0.01</text>
  <text x="232" y="148" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">+0.04</text>
  <text x="336" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">−0.03</text>
  <text x="440" y="149" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">+0.02</text>
  <text x="544" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">−0.02</text>
  <text x="605" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">+0.01</text>

  <!-- Legend -->
  <rect x="420" y="56" width="175" height="42" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.95"/>
  <line x1="432" y1="70" x2="455" y2="70" stroke="#2563eb" stroke-width="2.5"/><circle cx="443" cy="70" r="3.5" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="462" y="74" font-size="9" fill="#1e293b" font-weight="600">Mean residual</text>
  <rect x="432" y="83" width="23" height="8" rx="2" fill="#3b82f6" opacity="0.3"/><text x="462" y="92" font-size="9" fill="#475569">±1σ band</text>

  <text x="345" y="390" text-anchor="middle" font-size="9" fill="#64748b">Mean residual stays close to zero (±0.04 dB) across all distances — unbiased estimator confirmed</text>
</svg>
