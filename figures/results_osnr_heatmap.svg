<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="hm_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="700" height="380" rx="14" fill="url(#hm_bg)"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">OSNR RMSE Heatmap: Format × OSNR Range</text>
  <text x="350" y="44" text-anchor="middle" font-size="10" fill="#64748b">28 GBd — mid-range OSNR yields lowest errors (paper Fig. 18)</text>

  <!-- Heatmap grid: 5 rows (formats) × 5 cols (OSNR ranges) -->
  <!-- Cell size: 90×50, starting at (130, 70) -->

  <!-- Color scale: 0.4=deep green → 0.7=yellow → 1.2=deep red -->
  <!-- Row headers -->
  <text x="122" y="100" text-anchor="end" font-size="10" font-weight="600" fill="#475569">QPSK</text>
  <text x="122" y="155" text-anchor="end" font-size="10" font-weight="600" fill="#475569">8-QAM</text>
  <text x="122" y="210" text-anchor="end" font-size="10" font-weight="600" fill="#475569">16-QAM</text>
  <text x="122" y="265" text-anchor="end" font-size="10" font-weight="600" fill="#475569">32-QAM</text>
  <text x="122" y="320" text-anchor="end" font-size="10" font-weight="600" fill="#475569">64-QAM</text>

  <!-- Column headers (OSNR ranges) -->
  <text x="175" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">10-14</text>
  <text x="265" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">14-18</text>
  <text x="355" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">18-22</text>
  <text x="445" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">22-26</text>
  <text x="535" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">26-30</text>

  <!-- QPSK row: 0.92, 0.70, 0.52, 0.58, 0.68 -->
  <rect x="130" y="75" width="90" height="50" fill="#fbbf24" rx="4"/><text x="175" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.92</text>
  <rect x="220" y="75" width="90" height="50" fill="#86efac" rx="4"/><text x="265" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.70</text>
  <rect x="310" y="75" width="90" height="50" fill="#22c55e" rx="4"/><text x="355" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">0.52</text>
  <rect x="400" y="75" width="90" height="50" fill="#4ade80" rx="4"/><text x="445" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.58</text>
  <rect x="490" y="75" width="90" height="50" fill="#86efac" rx="4"/><text x="535" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.68</text>

  <!-- 8QAM row: 1.02, 0.78, 0.60, 0.65, 0.75 -->
  <rect x="130" y="130" width="90" height="50" fill="#fb923c" rx="4"/><text x="175" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">1.02</text>
  <rect x="220" y="130" width="90" height="50" fill="#86efac" rx="4"/><text x="265" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.78</text>
  <rect x="310" y="130" width="90" height="50" fill="#22c55e" rx="4"/><text x="355" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">0.60</text>
  <rect x="400" y="130" width="90" height="50" fill="#4ade80" rx="4"/><text x="445" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.65</text>
  <rect x="490" y="130" width="90" height="50" fill="#86efac" rx="4"/><text x="535" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.75</text>

  <!-- 16QAM row: 1.12, 0.88, 0.68, 0.72, 0.82 -->
  <rect x="130" y="185" width="90" height="50" fill="#f87171" rx="4"/><text x="175" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1.12</text>
  <rect x="220" y="185" width="90" height="50" fill="#fbbf24" rx="4"/><text x="265" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.88</text>
  <rect x="310" y="185" width="90" height="50" fill="#86efac" rx="4"/><text x="355" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.68</text>
  <rect x="400" y="185" width="90" height="50" fill="#86efac" rx="4"/><text x="445" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.72</text>
  <rect x="490" y="185" width="90" height="50" fill="#fbbf24" rx="4"/><text x="535" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.82</text>

  <!-- 32QAM row: 1.25, 0.98, 0.75, 0.80, 0.90 -->
  <rect x="130" y="240" width="90" height="50" fill="#ef4444" rx="4"/><text x="175" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1.25</text>
  <rect x="220" y="240" width="90" height="50" fill="#fb923c" rx="4"/><text x="265" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">0.98</text>
  <rect x="310" y="240" width="90" height="50" fill="#86efac" rx="4"/><text x="355" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">0.75</text>
  <rect x="400" y="240" width="90" height="50" fill="#fbbf24" rx="4"/><text x="445" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.80</text>
  <rect x="490" y="240" width="90" height="50" fill="#fbbf24" rx="4"/><text x="535" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.90</text>

  <!-- 64QAM row: 1.35, 1.10, 0.85, 0.90, 1.00 -->
  <rect x="130" y="295" width="90" height="50" fill="#dc2626" rx="4"/><text x="175" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1.35</text>
  <rect x="220" y="295" width="90" height="50" fill="#f87171" rx="4"/><text x="265" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1.10</text>
  <rect x="310" y="295" width="90" height="50" fill="#fbbf24" rx="4"/><text x="355" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.85</text>
  <rect x="400" y="295" width="90" height="50" fill="#fbbf24" rx="4"/><text x="445" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">0.90</text>
  <rect x="490" y="295" width="90" height="50" fill="#fb923c" rx="4"/><text x="535" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">1.00</text>

  <!-- Grid lines -->
  <rect x="130" y="75" width="450" height="270" fill="none" stroke="#fff" stroke-width="2" rx="4"/>
  <g stroke="#fff" stroke-width="2">
    <line x1="220" y1="75" x2="220" y2="345"/><line x1="310" y1="75" x2="310" y2="345"/>
    <line x1="400" y1="75" x2="400" y2="345"/><line x1="490" y1="75" x2="490" y2="345"/>
    <line x1="130" y1="130" x2="580" y2="130"/><line x1="130" y1="185" x2="580" y2="185"/>
    <line x1="130" y1="240" x2="580" y2="240"/><line x1="130" y1="295" x2="580" y2="295"/>
  </g>

  <!-- Color scale -->
  <rect x="600" y="80" width="22" height="30" rx="3" fill="#22c55e"/><text x="630" y="100" font-size="8" fill="#475569">&lt; 0.6</text>
  <rect x="600" y="115" width="22" height="30" rx="3" fill="#86efac"/><text x="630" y="135" font-size="8" fill="#475569">0.6–0.8</text>
  <rect x="600" y="150" width="22" height="30" rx="3" fill="#fbbf24"/><text x="630" y="170" font-size="8" fill="#475569">0.8–1.0</text>
  <rect x="600" y="185" width="22" height="30" rx="3" fill="#fb923c"/><text x="630" y="205" font-size="8" fill="#475569">1.0–1.2</text>
  <rect x="600" y="220" width="22" height="30" rx="3" fill="#f87171"/><text x="630" y="240" font-size="8" fill="#475569">1.2–1.3</text>
  <rect x="600" y="255" width="22" height="30" rx="3" fill="#dc2626"/><text x="630" y="275" font-size="8" fill="#475569">&gt; 1.3</text>
  <text x="611" y="305" text-anchor="middle" font-size="8" fill="#64748b">RMSE (dB)</text>

  <text x="355" y="44" text-anchor="middle" font-size="10" fill="#64748b">OSNR Range (dB)</text>
</svg>
